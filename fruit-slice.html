<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>雙手切水果・M88888888</title>
  <style>
    *{box-sizing:border-box}body{margin:0;overflow:hidden;background:#07121d;color:white;font-family:system-ui,"Noto Sans TC",sans-serif}video{display:none}canvas{position:fixed;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 75%,#163b50,#050912 70%)}
    header{position:fixed;z-index:2;top:0;left:0;right:0;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(#02070ddd,transparent);pointer-events:none}h1{font-size:clamp(18px,2.5vw,30px);margin:0;letter-spacing:.1em;text-shadow:0 0 15px #59efff}.score{display:flex;gap:18px}.stat{min-width:98px;padding:7px 12px;border:1px solid #65ecff88;border-radius:9px;background:#06121bbb;text-align:center}.stat small{display:block;color:#91b9c8;letter-spacing:.1em}.stat b{font-size:25px;color:#dffcff}
    #tip{position:fixed;z-index:2;left:24px;bottom:22px;padding:11px 15px;border-left:3px solid #ffdd6b;background:#071520bb;font-size:13px;line-height:1.6}.panel{position:fixed;z-index:5;inset:0;display:grid;place-items:center;background:#020811b8;backdrop-filter:blur(8px)}.card{width:min(440px,90vw);padding:31px;text-align:center;border:1px solid #7cf6ff80;border-radius:18px;background:#071827ee;box-shadow:0 0 50px #00c2dd35}.card h2{margin:0 0 12px;font-size:29px}.card p{color:#b8d4dd;line-height:1.7}.card button{margin-top:10px;padding:13px 25px;border:0;border-radius:8px;background:#70f4ff;color:#04202b;font-weight:800;font-size:16px;cursor:pointer}.card button:disabled{opacity:.6}.danger{color:#ff9d9d}@media(max-width:600px){header{padding:12px}.score{gap:6px}.stat{min-width:70px;padding:4px 7px}.stat b{font-size:20px}#tip{left:12px;bottom:10px}}
  </style>
</head>
<body>
  <video id="video" playsinline muted></video><canvas id="game"></canvas>
  <header><h1>雙手切水果</h1><div class="score"><div class="stat"><small>SCORE</small><b id="score">0</b></div><div class="stat"><small>TIME</small><b id="time">60</b></div></div></header>
  <div id="tip">雙手食指就是刀刃：快速劃過水果得分。<br><span class="danger">碰到炸彈扣 15 分！</span></div>
  <div class="panel" id="panel"><div class="card"><h2>🍉 雙手切水果</h2><p>張開雙手，揮動食指切開飛出的水果。<br>炸彈會扣分，時間結束後可立即再玩。</p><button id="start">啟動攝影機與遊戲</button><p id="notice"></p></div></div>
  <script type="module">
    const $=s=>document.querySelector(s),video=$('#video'),canvas=$('#game'),ctx=canvas.getContext('2d');let HandLandmarker,FilesetResolver,DrawingUtils,landmarker,running=false,loopStarted=false,lastVideo=-1,score=0,seconds=60,lastTick=0,lastSpawn=0,objects=[],hands=[],trails=[];
    const fruits=[['🍎','#ff5f66'],['🍊','#ff9f48'],['🍋','#ffd74b'],['🍉','#ff5f8a'],['🍇','#9f6cff'],['🍑','#ff9c91']];
    function resize(){canvas.width=innerWidth;canvas.height=innerHeight}addEventListener('resize',resize);resize();
    const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
    function addObject(){const bomb=Math.random()<.17,f=fruits[Math.floor(Math.random()*fruits.length)],r=bomb?31:28+Math.random()*10;objects.push({x:70+Math.random()*(innerWidth-140),y:innerHeight+55,vx:(Math.random()-.5)*4,vy:-12-Math.random()*7,r,bomb,emoji:bomb?'💣':f[0],color:bomb?'#3d4650':f[1],cut:false,parts:[]})}
    function slice(o){if(o.cut)return;o.cut=true;if(o.bomb){score=Math.max(0,score-15);flash('#ff3131')}else{score+=10;flash('#78ff9c')}$('#score').textContent=score;for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;o.parts.push({x:o.x,y:o.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1})}}
    function flash(c){document.body.animate([{background:c},{background:'#07121d'}],{duration:230})}
    function updateGame(now){if(!running)return;if(!lastTick)lastTick=now;const dt=(now-lastTick)/1000;lastTick=now;seconds=Math.max(0,seconds-dt);$('#time').textContent=Math.ceil(seconds);if(!seconds){finish();return}if(now-lastSpawn>750){addObject();lastSpawn=now}for(const o of objects){o.vy+=.24;o.x+=o.vx;o.y+=o.vy;if(!o.cut){for(const trail of trails){for(let i=1;i<trail.length;i++){const a=trail[i-1],b=trail[i];const d=Math.min(dist({x:o.x,y:o.y},a),dist({x:o.x,y:o.y},b));if(d<o.r+12&&Math.hypot(a.x-b.x,a.y-b.y)>10)slice(o)}}}for(const p of o.parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.life-=.035}}objects=objects.filter(o=>o.y<innerHeight+120&&(!o.cut||o.parts.some(p=>p.life>0)))}
    function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);if(video.readyState>=2){ctx.save();ctx.scale(-1,1);ctx.drawImage(video,-innerWidth,0,innerWidth,innerHeight);ctx.restore();ctx.fillStyle='#03111a66';ctx.fillRect(0,0,innerWidth,innerHeight)}for(const o of objects){if(!o.cut){ctx.beginPath();ctx.arc(o.x,o.y,o.r+7,0,7);ctx.fillStyle=o.color+'55';ctx.fill();ctx.font=`${o.r*1.65}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.emoji,o.x,o.y)}for(const p of o.parts){if(p.life>0){ctx.globalAlpha=p.life;ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fill();ctx.globalAlpha=1}}}for(const trail of trails){if(trail.length>1){ctx.beginPath();ctx.moveTo(trail[0].x,trail[0].y);for(let i=1;i<trail.length;i++)ctx.lineTo(trail[i].x,trail[i].y);ctx.strokeStyle='#73fbff';ctx.lineWidth=7;ctx.lineCap='round';ctx.shadowColor='#00d9ff';ctx.shadowBlur=16;ctx.stroke();ctx.shadowBlur=0;const p=trail.at(-1);ctx.beginPath();ctx.arc(p.x,p.y,9,0,7);ctx.fillStyle='#e7ffff';ctx.fill()}}}
    function detect(now){if(video.currentTime===lastVideo)return;lastVideo=video.currentTime;const result=landmarker.detectForVideo(video,now);hands=result.landmarks||[];trails=hands.map((l,i)=>{const p={x:(1-l[8].x)*innerWidth,y:l[8].y*innerHeight};const old=trails[i]||[];return [...old,p].slice(-8)});}
    function loop(now){requestAnimationFrame(loop);if(!running)return;detect(now);updateGame(now);draw()}
    function finish(){running=false;$('#panel').style.display='grid';$('#start').disabled=false;$('#start').textContent='再玩一次';$('#notice').textContent=`本局得分：${score} 分`}
    $('#start').onclick=async()=>{const b=$('#start');b.disabled=true;$('#notice').textContent='正在載入手部辨識模型…';try{if(!landmarker){({HandLandmarker,FilesetResolver,DrawingUtils}=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35'));const v=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm');landmarker=await HandLandmarker.createFromOptions(v,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',delegate:'CPU'},runningMode:'VIDEO',numHands:2})}if(!video.srcObject){video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});await video.play()}score=0;seconds=60;objects=[];trails=[];lastTick=0;lastSpawn=performance.now();$('#score').textContent=score;$('#time').textContent=seconds;$('#panel').style.display='none';running=true;if(!loopStarted){loopStarted=true;requestAnimationFrame(loop)}}catch(e){console.error(e);b.disabled=false;$('#notice').textContent='啟動失敗，請確認網路與攝影機權限後再試。'}};
  </script>
</body>
</html>
