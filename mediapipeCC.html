<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M88888888 欒帥資訊牆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05060f;
    overflow: hidden;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    color: #fff;
  }
  #stage { position: relative; width: 100vw; height: 100vh; }

  /* 粒子畫布：全螢幕最上層背景 */
  #particleCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* 攝影機實體畫面 + 偵測結果（右下角子母畫面） */
  #camWrap {
    position: absolute;
    right: 20px; bottom: 20px;
    width: 420px;
    aspect-ratio: 4 / 3;
    border: 2px solid rgba(0, 255, 220, .6);
    border-radius: 12px;
    overflow: hidden;
    z-index: 5;
    box-shadow: 0 0 24px rgba(0, 255, 220, .35);
    background: #000;
  }
  #video, #overlayCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);   /* 鏡像顯示，比較直覺 */
  }
  #overlayCanvas { z-index: 2; }

  /* 標題列 */
  #titleBar {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 14px 0 10px;
    z-index: 10;
    background: linear-gradient(180deg, rgba(5,6,15,.85), transparent);
  }
  #titleBar h1 {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #00ffd0, #6a8dff, #ff6ad5, #ffd166, #00ffd0);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: flow 8s linear infinite;
    text-shadow: 0 0 30px rgba(106, 141, 255, .25);
  }
  @keyframes flow { to { background-position: 300% 0; } }

  /* 左側資訊面板 */
  #infoPanel {
    position: absolute;
    left: 20px; bottom: 20px;
    z-index: 10;
    background: rgba(10, 14, 30, .72);
    border: 1px solid rgba(120, 160, 255, .35);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 300px;
    backdrop-filter: blur(6px);
    line-height: 1.9;
    font-size: 15px;
  }
  #infoPanel .clock { font-size: 26px; font-weight: 700; color: #00ffd0; }
  #infoPanel .date  { font-size: 17px; color: #9fb4ff; }
  #infoPanel .row b { color: #ffd166; }
  #handState.open   { color: #00ff88; font-weight: 700; }
  #handState.closed { color: #ff5f7a; font-weight: 700; }
  #handState.none   { color: #888; }

  .bar {
    width: 100%; height: 8px;
    background: rgba(255,255,255,.12);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 2px;
  }
  .bar > i {
    display: block; height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ffd0, #6a8dff);
    border-radius: 4px;
    transition: width .12s linear;
  }

  #loading {
    position: absolute; inset: 0;
    z-index: 99;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: #05060f;
    font-size: 20px; letter-spacing: 2px;
  }
  .spinner {
    width: 52px; height: 52px;
    border: 4px solid rgba(0,255,208,.2);
    border-top-color: #00ffd0;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="particleCanvas"></canvas>

  <div id="titleBar"><h1>M88888888 欒帥資訊牆</h1></div>

  <div id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div id="infoPanel">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="dateText">----年--月--日</div>
    <div class="row">右手狀態：<span id="handState" class="none">未偵測</span></div>
    <div class="row">張開程度：<b id="openPct">--</b>
      <div class="bar"><i id="openBar"></i></div>
    </div>
    <div class="row">與螢幕距離：<b id="distText">--</b>
      <div class="bar"><i id="distBar"></i></div>
    </div>
    <div class="row">目前圖形：<b id="shapeText">愛心</b>　顏色：<b id="colorText">─</b></div>
    <div class="row" style="font-size:13px;color:#8899bb">握拳→張開可切換形狀與顏色｜靠近螢幕粒子範圍變小</div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>載入 MediaPipe 模型中，請稍候並允許攝影機權限…</div>
  </div>
</div>

<script type="module">
import {
  FilesetResolver,
  HandLandmarker,
  PoseLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

/* ============ DOM ============ */
const video          = document.getElementById("video");
const overlayCanvas  = document.getElementById("overlayCanvas");
const overlayCtx     = overlayCanvas.getContext("2d");
const particleCanvas = document.getElementById("particleCanvas");
const pCtx           = particleCanvas.getContext("2d");
const loadingEl      = document.getElementById("loading");

const clockEl   = document.getElementById("clock");
const dateEl    = document.getElementById("dateText");
const handEl    = document.getElementById("handState");
const openPctEl = document.getElementById("openPct");
const openBarEl = document.getElementById("openBar");
const distEl    = document.getElementById("distText");
const distBarEl = document.getElementById("distBar");
const shapeEl   = document.getElementById("shapeText");
const colorEl   = document.getElementById("colorText");

function resize() {
  particleCanvas.width  = innerWidth;
  particleCanvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

/* ============ 時鐘 ============ */
const WEEK = ["日","一","二","三","四","五","六"];
function tickClock() {
  const n = new Date();
  clockEl.textContent = n.toLocaleTimeString("zh-TW", { hour12: false });
  dateEl.textContent =
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 星期${WEEK[n.getDay()]}`;
}
setInterval(tickClock, 500);
tickClock();

/* ============ 形狀定義（回傳單位座標 -1..1） ============ */
function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x: x/17, y: -y/17 };
}
function starPoint(t) {
  const spikes = 5, outer = 1, inner = 0.42;
  const seg = (t / (Math.PI*2)) * spikes * 2;
  const i = Math.floor(seg), frac = seg - i;
  const r1 = (i % 2 === 0) ? outer : inner;
  const r2 = (i % 2 === 0) ? inner : outer;
  const a1 = (i    / (spikes*2)) * Math.PI*2 - Math.PI/2;
  const a2 = ((i+1)/ (spikes*2)) * Math.PI*2 - Math.PI/2;
  const x = r1*Math.cos(a1) + (r2*Math.cos(a2) - r1*Math.cos(a1))*frac;
  const y = r1*Math.sin(a1) + (r2*Math.sin(a2) - r1*Math.sin(a1))*frac;
  return { x, y };
}
function flowerPoint(t) {          // 五瓣花（玫瑰曲線）
  const r = Math.abs(Math.cos(2.5 * t));
  return { x: r*Math.cos(t), y: r*Math.sin(t) };
}
function butterflyPoint(t) {       // 蝴蝶曲線
  const s = t * 6;                 // 需要較長參數域
  const r = Math.exp(Math.sin(s)) - 2*Math.cos(4*s) + Math.pow(Math.sin((2*s - Math.PI)/24), 5);
  return { x: r*Math.sin(s)/4, y: -r*Math.cos(s)/4 + 0.15 };
}
function spiralPoint(t) {          // 三圈螺旋
  const turns = 3;
  const a = t * turns;
  const r = t / (Math.PI*2);
  return { x: r*Math.cos(a), y: r*Math.sin(a) };
}

const SHAPES = [
  { name: "愛心",  fn: heartPoint },
  { name: "星星",  fn: starPoint },
  { name: "花朵",  fn: flowerPoint },
  { name: "蝴蝶",  fn: butterflyPoint },
  { name: "螺旋",  fn: spiralPoint },
];

/* 顯著不同的顏色組（主色 / 輔色） */
const PALETTES = [
  { name: "赤紅",  a: "#ff2d55", b: "#ff9500" },
  { name: "青綠",  a: "#00ffa8", b: "#00ccff" },
  { name: "寶藍",  a: "#3a7bff", b: "#9d6bff" },
  { name: "金黃",  a: "#ffd60a", b: "#ff7b00" },
  { name: "紫紅",  a: "#ff2dcb", b: "#7a5cff" },
  { name: "純白",  a: "#ffffff", b: "#9adcff" },
];

/* ============ 粒子系統 ============ */
const N = 4000;
const particles = [];
for (let i = 0; i < N; i++) {
  particles.push({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    vx: 0, vy: 0,
    t: (i / N) * Math.PI * 2,          // 形狀參數
    jx: (Math.random()-0.5),           // 發散用亂數方向
    jy: (Math.random()-0.5),
    size: 1.5 + Math.random()*2.5,
    tw: Math.random()*Math.PI*2,       // 閃爍相位
  });
}

let shapeIdx = 0;
let paletteIdx = 0;
let openness = 0.5;        // 0=握拳 1=全開（平滑後）
let rawOpenness = 0.5;
let distScale = 1.0;       // 距離造成的整體縮放（平滑後）
let rawDistScale = 1.0;
let handDetected = false;
let wasClosed = false;

function applyShape() {
  shapeEl.textContent = SHAPES[shapeIdx].name;
  const p = PALETTES[paletteIdx];
  colorEl.textContent = p.name;
  colorEl.style.color = p.a;
}
applyShape();

function drawParticles() {
  const W = particleCanvas.width, H = particleCanvas.height;
  pCtx.clearRect(0, 0, W, H);

  // 平滑
  openness  += (rawOpenness  - openness)  * 0.12;
  distScale += (rawDistScale - distScale) * 0.08;

  const cx = W/2, cy = H/2 + 20;
  const baseR = Math.min(W, H) * 0.52 * distScale;
  // 握拳時縮到 8%，全開時 100% 並額外發散（允許衝出螢幕外）
  const scale = baseR * (0.08 + 0.92 * openness);
  const scatter = Math.max(0, openness - 0.55) * baseR * 6.0;  // 快全開時爆發式發散

  const pal = PALETTES[paletteIdx];
  const shapeFn = SHAPES[shapeIdx].fn;
  const time = performance.now() / 1000;

  pCtx.globalCompositeOperation = "lighter";
  for (const p of particles) {
    const pt = shapeFn(p.t);
    const tx = cx + pt.x * scale + p.jx * scatter;
    const ty = cy + pt.y * scale + p.jy * scatter;
    // 彈簧追蹤
    p.vx = (p.vx + (tx - p.x) * 0.045) * 0.86;
    p.vy = (p.vy + (ty - p.y) * 0.045) * 0.86;
    p.x += p.vx;
    p.y += p.vy;

    const twinkle = 0.55 + 0.45 * Math.sin(time*3 + p.tw);
    pCtx.globalAlpha = twinkle * (0.35 + 0.65*openness);
    pCtx.fillStyle = (p.t % (Math.PI/2) < Math.PI/4) ? pal.a : pal.b;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * (0.6 + 0.6*openness), 0, Math.PI*2);
    pCtx.fill();
  }
  pCtx.globalAlpha = 1;
  pCtx.globalCompositeOperation = "source-over";
}

/* ============ MediaPipe ============ */
let handLandmarker, poseLandmarker;

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  [handLandmarker, poseLandmarker] = await Promise.all([
    HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2
    }),
    PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    })
  ]);

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480 }, audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadeddata = r);
  overlayCanvas.width  = video.videoWidth;
  overlayCanvas.height = video.videoHeight;

  loadingEl.style.display = "none";
  requestAnimationFrame(loop);
}

function dist2D(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

/* ============ 霓虹風格骨架繪製 ============ */
function px(lm) {
  return { x: lm.x * overlayCanvas.width, y: lm.y * overlayCanvas.height };
}

/* 發光線段：外層光暈 + 內層亮芯 */
function glowLine(ctx, a, b, color, width) {
  ctx.save();
  ctx.lineCap = "round";
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "rgba(255,255,255,.85)";
  ctx.lineWidth = Math.max(1, width * 0.35);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.restore();
}

/* 發光關節點：光暈圓 + 白色亮芯 */
function glowDot(ctx, p, color, r) {
  const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.6);
  g.addColorStop(0, color);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(p.x, p.y, r * 2.6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(p.x, p.y, r * 0.55, 0, Math.PI * 2); ctx.fill();
}

/* 人體骨架：依部位配色（軀幹金、手臂青、腿紫、臉粉） */
const POSE_COLOR_OF = i =>
  i <= 10 ? "#ff8fd8" :                       // 臉
  (i === 11 || i === 12 || i === 23 || i === 24) ? "#ffd166" : // 軀幹端點
  (i <= 22) ? "#00e5ff" :                     // 手臂/手
  "#b388ff";                                  // 腿/腳

function drawPoseGlow(lm) {
  const ctx = overlayCtx;
  for (const c of PoseLandmarker.POSE_CONNECTIONS) {
    const a = lm[c.start], b = lm[c.end];
    if (a.visibility < 0.5 || b.visibility < 0.5) continue;
    const pa = px(a), pb = px(b);
    // 以線段兩端部位色做漸層
    const grad = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    grad.addColorStop(0, POSE_COLOR_OF(c.start));
    grad.addColorStop(1, POSE_COLOR_OF(c.end));
    glowLine(ctx, pa, pb, POSE_COLOR_OF(c.end), 4);
    ctx.save();
    ctx.strokeStyle = grad; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
    ctx.restore();
  }
  for (let i = 0; i < lm.length; i++) {
    if (i > 10 && lm[i].visibility < 0.5) continue;
    if (i > 0 && i <= 10) continue;           // 臉部只留鼻尖，避免雜亂
    glowDot(overlayCtx, px(lm[i]), POSE_COLOR_OF(i), i === 0 ? 6 : 4.5);
  }
}

/* 手部：五指各自配色，右手亮彩、左手灰藍 */
const FINGER_COLORS = ["#ff5f7a", "#ffd166", "#06f7a1", "#4cc9f0", "#c77dff"];
function fingerOf(i) {
  if (i >= 1  && i <= 4)  return 0;   // 拇指
  if (i >= 5  && i <= 8)  return 1;   // 食指
  if (i >= 9  && i <= 12) return 2;   // 中指
  if (i >= 13 && i <= 16) return 3;   // 無名指
  if (i >= 17 && i <= 20) return 4;   // 小指
  return -1;                          // 手腕/掌心
}

function drawHandGlow(lm, isRight) {
  const ctx = overlayCtx;
  for (const c of HandLandmarker.HAND_CONNECTIONS) {
    const f = Math.max(fingerOf(c.start), fingerOf(c.end));
    const color = !isRight ? "#7a8ba8"
      : (f >= 0 ? FINGER_COLORS[f] : "#ffffff");
    glowLine(ctx, px(lm[c.start]), px(lm[c.end]), color, isRight ? 4 : 3);
  }
  for (let i = 0; i < lm.length; i++) {
    const f = fingerOf(i);
    const color = !isRight ? "#9fb0c8"
      : (f >= 0 ? FINGER_COLORS[f] : "#ffffff");
    // 指尖點放大更醒目
    const tip = (i === 4 || i === 8 || i === 12 || i === 16 || i === 20);
    glowDot(ctx, px(lm[i]), color, tip ? 6 : 4);
  }
  if (isRight) {
    // 右手標籤
    const w = px(lm[0]);
    ctx.save();
    ctx.font = "bold 16px 'Microsoft JhengHei', sans-serif";
    ctx.shadowColor = "#00ff88"; ctx.shadowBlur = 10;
    ctx.fillStyle = "#00ff88";
    ctx.scale(-1, 1);   // 抵銷 CSS 鏡像，文字才不會左右顛倒
    ctx.fillText("控制手 R", -w.x - 80, w.y + 28);
    ctx.restore();
  }
}

/* 計算手掌張開程度：指尖到手腕平均距離 / 手掌基準長度 */
function computeOpenness(lm) {
  const wrist = lm[0];
  const palmLen = dist2D(wrist, lm[9]) || 1e-6;   // 手腕→中指根
  const tips = [4, 8, 12, 16, 20];
  let sum = 0;
  for (const i of tips) sum += dist2D(wrist, lm[i]);
  const ratio = (sum / tips.length) / palmLen;
  // 握拳約 0.9，全開約 1.9 → 映射到 0..1
  return Math.min(1, Math.max(0, (ratio - 1.0) / 0.85));
}

let lastVideoTime = -1;

function loop() {
  requestAnimationFrame(loop);
  if (video.currentTime === lastVideoTime) { drawParticles(); return; }
  lastVideoTime = video.currentTime;
  const nowMs = performance.now();

  const handRes = handLandmarker.detectForVideo(video, nowMs);
  const poseRes = poseLandmarker.detectForVideo(video, nowMs);

  /* --- 偵測結果繪製在攝影機畫面上 --- */
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  if (poseRes.landmarks) {
    for (const lm of poseRes.landmarks) drawPoseGlow(lm);
  }

  /* --- 找右手（影像未鏡像，使用者右手被標為 "Left"） --- */
  let rightHand = null;
  if (handRes.landmarks && handRes.landmarks.length) {
    for (let i = 0; i < handRes.landmarks.length; i++) {
      const label = handRes.handednesses?.[i]?.[0]?.categoryName;
      const isRight = (label === "Left");
      drawHandGlow(handRes.landmarks[i], isRight);
      if (isRight) rightHand = handRes.landmarks[i];
    }
    // 只有一隻手且沒抓到右手 → 就用它，避免辨識邊界抖動
    if (!rightHand && handRes.landmarks.length === 1) rightHand = handRes.landmarks[0];
  }

  if (rightHand) {
    handDetected = true;
    rawOpenness = computeOpenness(rightHand);

    /* 距離估計：手在畫面中越大 = 越靠近鏡頭 → 粒子範圍越小 */
    const handSize = dist2D(rightHand[0], rightHand[9]);   // 0.04(遠)~0.30(近)
    const near = Math.min(1, Math.max(0, (handSize - 0.05) / 0.22)); // 0=遠 1=近
    rawDistScale = 1.6 - near * 1.3;   // 遠:1.6倍 → 近:0.3倍

    /* 握拳→張開的瞬間：換形狀 + 換顏色 */
    const isClosed = rawOpenness < 0.25;
    const isOpen   = rawOpenness > 0.65;
    if (isClosed) wasClosed = true;
    if (wasClosed && isOpen) {
      wasClosed = false;
      shapeIdx   = (shapeIdx + 1) % SHAPES.length;
      paletteIdx = (paletteIdx + 1) % PALETTES.length;
      applyShape();
    }

    /* 更新資訊面板 */
    if (isClosed) {
      handEl.textContent = "✊ 握拳";
      handEl.className = "closed";
    } else if (isOpen) {
      handEl.textContent = "🖐 張開";
      handEl.className = "open";
    } else {
      handEl.textContent = "🤏 半開";
      handEl.className = "open";
    }
    openPctEl.textContent = Math.round(rawOpenness*100) + "%";
    openBarEl.style.width = (rawOpenness*100) + "%";
    distEl.textContent = near > 0.66 ? "近" : near > 0.33 ? "中" : "遠";
    distBarEl.style.width = (near*100) + "%";
  } else {
    handDetected = false;
    handEl.textContent = "未偵測";
    handEl.className = "none";
  }

  drawParticles();
}

init().catch(err => {
  loadingEl.innerHTML = `<div style="color:#ff5f7a;max-width:600px;text-align:center;line-height:1.8">
    初始化失敗：${err.message}<br>
    請確認已允許攝影機權限，並使用 http(s) 或 localhost 開啟本頁（file:// 無法使用攝影機）。
  </div>`;
  console.error(err);
});
</script>
</body>
</html>
